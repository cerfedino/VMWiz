name: "vmwiz-prod"

networks:
  vmwiz-internal:
    external: false

services:
  vmwiz-caddy:
    container_name: vmwiz-caddy
    image: caddy:2.11.2@sha256:25cdc846626b62d05f6b633b9b40c2c9f6ef89b515dc76133cefd920f7dbe562
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    networks:
      - vmwiz-internal
    cap_add:
      - NET_ADMIN
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data/Caddy/caddy_data:/data
      - ./data/Caddy/caddy_config:/config
      - /etc/timezone:/etc/timezone
      - /etc/localtime:/etc/localtime
    env_file:
      - .env

  vmwiz-backend:
    container_name: vmwiz-backend
    image: docker.git.sos.ethz.ch/vsos/vmwiz.vsos.ethz.ch/backend:latest
    restart: unless-stopped
    expose:
      - 8081
    networks:
      - vmwiz-internal
    volumes:
      - ./ssh:/root/.ssh
      - ./data/logs:/app/logs
      - /etc/timezone:/etc/timezone
      - /etc/localtime:/etc/localtime
    env_file:
      - .env
      - .db.env
      - .backend.env
    depends_on:
      vmwiz-db:
        condition: service_healthy

  vmwiz-notifier:
    container_name: vmwiz-notifier
    image: caronc/apprise:v1.5.0@sha256:43673bf62faa88148298d52664b37b4860189555db0b251b54d79a3ef3a173cf
    restart: unless-stopped
    networks:
      - vmwiz-internal
    volumes:
      - ${PWD}/notifier_config.yml:/config/default.yml
      - /etc/timezone:/etc/timezone
      - /etc/localtime:/etc/localtime
    expose:
      - 8000
    environment:
      - APPRISE_STATEFUL_MODE=simple
      - APPRISE_DEFAULT_CONFIG_ID=default
      - APPRISE_WORKER_COUNT=1

  vmwiz-db:
    container_name: vmwiz-db
    image: postgres:18.3@sha256:7e32e9833a6fb1c92c32552794cb6ed569d51b445a54907d35fc112ef39684db
    restart: unless-stopped
    networks:
      - vmwiz-internal
    expose:
      - "5432"
    volumes:
      - ./data/postgres/:/var/lib/postgresql/
      - /etc/timezone:/etc/timezone
      - /etc/localtime:/etc/localtime
    env_file:
      - .db.env
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "psql -U $$POSTGRES_USER -d $$POSTGRES_DB -c 'SELECT 1' || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  vmwiz-frontend:
    container_name: vmwiz-frontend
    image: docker.git.sos.ethz.ch/vsos/vmwiz.vsos.ethz.ch/frontend:latest
    restart: unless-stopped
    expose:
      - 3000
    networks:
      - vmwiz-internal
    volumes:
      - /etc/timezone:/etc/timezone
      - /etc/localtime:/etc/localtime
