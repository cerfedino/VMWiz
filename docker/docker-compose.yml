name: "vmwiz-dev"

networks:
  vmwiz-internal:
    external: false

services:
  vmwiz-caddy:
    container_name: vmwiz-caddy
    image: caddy:2.11.2@sha256:25cdc846626b62d05f6b633b9b40c2c9f6ef89b515dc76133cefd920f7dbe562
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    networks:
      - vmwiz-internal
    cap_add:
      - NET_ADMIN
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data/Caddy/caddy_data:/data
      - ./data/Caddy/caddy_config:/config
      - /etc/timezone:/etc/timezone
      - /etc/localtime:/etc/localtime
    env_file:
      - .env

  vmwiz-backend:
    container_name: vmwiz-backend
    build:
      context: ../vmwiz-backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    networks:
      - vmwiz-internal
    command: ["air"]
    volumes:
      - ../vmwiz-backend:/app
      - ./ssh:/root/.ssh
      - /etc/timezone:/etc/timezone
      - /etc/localtime:/etc/localtime
    env_file:
      - .env
      - .db.env
      - .backend.env
    depends_on:
      vmwiz-db:
        condition: service_healthy

  vmwiz-notifier:
    container_name: vmwiz-notifier
    image: caronc/apprise:v1.3.3@sha256:4bfeac268ba87b8e08e308c9aa0182fe99e9501ec464027afc333d1634e65977
    restart: unless-stopped
    networks:
      - vmwiz-internal
    expose:
      - 8000
    volumes:
      - ${PWD}/notifier_config.yml:/config/default.yml
      - /etc/timezone:/etc/timezone
      - /etc/localtime:/etc/localtime
    environment:
      - APPRISE_STATEFUL_MODE=simple
      - APPRISE_DEFAULT_CONFIG_ID=default
      - APPRISE_WORKER_COUNT=1

  vmwiz-db:
    container_name: vmwiz-db
    image: postgres:18.3@sha256:78481659c47e862334611ccdaf7c369c986b3046da9857112f3b309114a65fb4
    restart: unless-stopped
    networks:
      - vmwiz-internal
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres/:/var/lib/postgresql/
      - /etc/timezone:/etc/timezone
      - /etc/localtime:/etc/localtime
    env_file:
      - .db.env
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "psql -U $$POSTGRES_USER -d $$POSTGRES_DB -c 'SELECT 1' || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  vmwiz-frontend:
    container_name: vmwiz-frontend
    build:
      context: ../vmwiz-frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    networks:
      - vmwiz-internal
    volumes:
      - ../vmwiz-frontend:/app
      - /etc/timezone:/etc/timezone
      - /etc/localtime:/etc/localtime
    working_dir: /app
    command: /bin/sh -c "yarn install && yarn dev"
